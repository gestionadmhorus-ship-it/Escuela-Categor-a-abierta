<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Maestro - Horus Dron</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; background: #08090d; color: white; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; height: 100vh; width: 100vw; }
        
        /* Layout Principal */
        #admin-wrapper { display: flex; flex-direction: row; width: 100%; height: 100%; }
        
        /* Panel Izquierdo (Edición) */
        #editor-panel { width: 50%; display: flex; flex-direction: row; border-right: 1px solid rgba(251, 215, 4, 0.3); background: rgba(8, 9, 13, 0.95); position: relative; z-index: 10; }
        
        /* Sidebar de Navegación */
        .admin-sidebar { width: 280px; background: rgba(0,0,0,0.5); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 30px 20px; overflow-y: auto; flex-shrink: 0; }
        
        /* Área Principal de Formularios */
        .admin-main-area { flex: 1; display: flex; flex-direction: column; padding: 30px; overflow: hidden; background: #0f111a; }
        .admin-tabs-content { flex: 1; overflow-y: auto; padding-right: 15px; }
        .admin-tabs-content::-webkit-scrollbar { width: 6px; }
        .admin-tabs-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .admin-tabs-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
        .admin-tabs-content::-webkit-scrollbar-thumb:hover { background: rgba(251,215,4,0.3); }

        /* Estilos de Controles */
        .admin-tab-pane { display: none; }
        .admin-tab-pane.active { display: block; }
        .admin-tab-btn { text-align: left; background: none; border: none; color: var(--text-secondary); padding: 12px 15px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.3s; display: flex; align-items: center; gap: 12px; }
        .admin-tab-btn.active { background: rgba(251, 215, 4, 0.1); color: var(--accent-yellow); box-shadow: inset 2px 0 0 var(--accent-yellow); }
        .admin-tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }

        /* Panel Derecho (Vista Previa) */
        #preview-panel { width: 50%; height: 100%; background: #000; position: relative; display: flex; flex-direction: column; }
        #live-preview { width: 100%; height: 100%; border: none; background: #fff; flex: 1; }
        
        .preview-overlay-tag { position: absolute; top: 20px; right: 20px; background: rgba(251, 215, 4, 0.9); color: black; font-weight: 800; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none; z-index: 100; display: flex; align-items: center; gap: 6px; }

        /* Login Modal (Full screen overlay) */
        #admin-login-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <!-- Modal de Login -->
    <div id="admin-login-modal" role="dialog" aria-modal="true">
        <div class="glass" style="max-width: 400px; width: 90%; padding: 40px; border-radius: 24px; border: 1px solid rgba(251, 215, 4, 0.3); background: rgba(15, 17, 26, 0.95);">
            <div style="text-align: center; margin-bottom: 25px;">
                <div style="background: rgba(251,215,4,0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 1px solid rgba(251,215,4,0.3);">
                    <i data-lucide="lock" style="color: var(--accent-yellow); width: 28px; height: 28px;"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 700; color: white;">Acceso Maestro</h3>
                <p style="font-size: 0.8rem; color: #8b95b0; margin-top: 5px;">Ingrese credenciales para editar el sitio</p>
            </div>
            <form id="admin-login-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="form-group" style="margin: 0;">
                    <label for="admin-password" class="admin-label">Contraseña</label>
                    <input type="password" id="admin-password" placeholder="••••••••" required class="admin-input" style="width: 100%; box-sizing: border-box;">
                </div>
                <div id="admin-login-error" style="color: #ff4a4a; font-size: 0.75rem; text-align: center; display: none;">Contraseña incorrecta</div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Ingresar</button>
                <a href="index.html" class="btn btn-outline" style="width: 100%; padding: 10px; font-size: 0.85rem; border: none; background: transparent; text-decoration: none; text-align: center; box-sizing: border-box; display: inline-block;">Volver a la Web</a>
            </form>
        </div>
    </div>

    <!-- Layout Dividido -->
    <div id="admin-wrapper" style="display: none;">
        
        <!-- MITAD IZQUIERDA: CONTROLES -->
        <div id="editor-panel">
            <!-- SIDEBAR -->
            <aside class="admin-sidebar">
                <div style="margin-bottom: 35px; padding-left: 10px;">
                    <h2 class="gradient-text" style="font-size: 1.5rem; font-weight: 800; line-height: 1.2;">Control<br>Maestro</h2>
                    <p style="font-size: 0.8rem; color: #8b95b0; margin-top: 5px;"><a href="index.html" style="color:var(--accent-yellow);text-decoration:none;">&larr; Ver Sitio en Vivo</a></p>
                </div>
                
                <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                    <button class="admin-tab-btn active" data-tab="admin-tab-settings" data-scroll="home">
                        <i data-lucide="layout-dashboard" style="width: 18px; height: 18px;"></i> Portada y Estadísticas
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-courses" data-scroll="courses">
                        <i data-lucide="book-open" style="width: 18px; height: 18px;"></i> Cursos y Módulos
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-simulator" data-scroll="platform">
                        <i data-lucide="award" style="width: 18px; height: 18px;"></i> Examen Teórico
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-testimonials" data-scroll="testimonios">
                        <i data-lucide="message-square" style="width: 18px; height: 18px;"></i> Testimonios
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-pricing" data-scroll="precios">
                        <i data-lucide="tag" style="width: 18px; height: 18px;"></i> Precios y Planes
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-about" data-scroll="nosotros">
                        <i data-lucide="users" style="width: 18px; height: 18px;"></i> Nosotros y Equipo
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-headerfooter" data-scroll="contact">
                        <i data-lucide="layout-template" style="width: 18px; height: 18px;"></i> Header & Footer
                    </button>
                    <button class="admin-tab-btn" data-tab="admin-tab-contact" data-scroll="contact">
                        <i data-lucide="phone" style="width: 18px; height: 18px;"></i> Contacto Escuela
                    </button>
                </nav>

                <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px;">
                    <input type="file" id="admin-import-file" accept=".json" style="display: none;">
                    <button id="admin-import-btn" class="btn btn-outline" style="padding: 12px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; border-radius: 10px;"><i data-lucide="upload" style="width: 16px; height: 16px;"></i> Restaurar Copia</button>
                    <button id="admin-export-btn" class="btn btn-outline" style="padding: 12px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; border-radius: 10px;"><i data-lucide="download" style="width: 16px; height: 16px;"></i> Respaldar (JSON)</button>
                    <button id="admin-reset-btn" class="btn btn-outline" style="padding: 12px; font-size: 0.85rem; border-color: rgba(255,74,74,0.3); color: #ff4a4a; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; border-radius: 10px;"><i data-lucide="rotate-ccw" style="width: 16px; height: 16px;"></i> Valores de Fábrica</button>
                    <button id="admin-logout-btn" class="btn btn-outline" style="padding: 12px; font-size: 0.85rem; border-color: rgba(255,255,255,0.15); color: #8b95b0; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; border-radius: 10px;"><i data-lucide="log-out" style="width: 16px; height: 16px;"></i> Cerrar Sesión</button>
                </div>
            </aside>

            <!-- ÁREA DE CONTENIDO -->
            <main class="admin-main-area">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                    <h3 id="admin-current-section-title" style="font-size: 1.6rem; color: white; font-weight: 700;">Portada y Estadísticas</h3>
                </div>

                <!-- Contenedores de Contenido de Pestañas -->
                <div class="admin-tabs-content">
                    
                    <div id="admin-tab-settings" class="admin-tab-pane active">
                        <div id="admin-settings-container" style="display: flex; flex-direction: column; gap: 30px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-courses" class="admin-tab-pane">
                        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                            <button id="admin-add-course-btn" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; border-radius: 10px;"><i data-lucide="plus" style="width: 18px; height: 18px;"></i> Crear Nuevo Curso</button>
                        </div>
                        <div id="admin-courses-list" style="display: flex; flex-direction: column; gap: 30px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-simulator" class="admin-tab-pane">
                        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                            <button id="admin-add-question-btn" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; border-radius: 10px;"><i data-lucide="plus" style="width: 18px; height: 18px;"></i> Nueva Pregunta</button>
                        </div>
                        <div id="admin-questions-list" style="display: flex; flex-direction: column; gap: 20px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-testimonials" class="admin-tab-pane">
                        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                            <button id="admin-add-testimonial-btn" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; border-radius: 10px;"><i data-lucide="plus" style="width: 18px; height: 18px;"></i> Añadir Reseña</button>
                        </div>
                        <div id="admin-testimonials-list" style="display: flex; flex-direction: column; gap: 20px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-pricing" class="admin-tab-pane">
                        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                            <button id="admin-add-plan-btn" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; border-radius: 10px;"><i data-lucide="plus" style="width: 18px; height: 18px;"></i> Crear Nuevo Plan</button>
                        </div>
                        <div id="admin-pricing-list" style="display: flex; flex-direction: column; gap: 30px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-about" class="admin-tab-pane">
                        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                            <button id="admin-add-instructor-btn" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; border-radius: 10px;"><i data-lucide="user-plus" style="width: 18px; height: 18px;"></i> Crear Nuevo Instructor</button>
                        </div>
                        <div id="admin-about-container" style="display: flex; flex-direction: column; gap: 30px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-headerfooter" class="admin-tab-pane">
                        <div id="admin-headerfooter-container" style="display: flex; flex-direction: column; gap: 30px;">
                            <!-- Dinámico -->
                        </div>
                    </div>

                    <div id="admin-tab-contact" class="admin-tab-pane">
                        <div id="admin-contact-form" style="display: flex; flex-direction: column; gap: 20px; max-width: 600px;">
                            <!-- Dinámico -->
                        </div>
                    </div>
                </div>

                <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; margin-top: 15px; display: flex; justify-content: flex-end; align-items: center; gap: 20px; flex-shrink: 0;">
                    <div id="admin-save-status" style="color: #4aff80; font-size: 0.95rem; display: none; align-items: center; gap: 6px;"><i data-lucide="check-circle" style="width: 18px; height: 18px;"></i> ¡Guardado y Sincronizado!</div>
                    <button id="admin-save-all-btn" class="btn btn-success" style="padding: 14px 35px; font-size: 1.1rem; font-weight: 800; background: #00b84c; color: white; border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: transform 0.2s, box-shadow 0.2s;"><i data-lucide="save" style="width: 20px; height: 20px;"></i> Publicar Cambios</button>
                </div>
            </main>
        </div>

        <!-- MITAD DERECHA: VISTA PREVIA -->
        <div id="preview-panel">
            <div class="preview-overlay-tag"><i data-lucide="eye" style="width: 16px; height: 16px;"></i> Vista Previa en Vivo</div>
            <!-- The iframe loads index.html?preview=true -->
            <iframe id="live-preview" src="index.html?preview=true"></iframe>
        </div>

    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" style="position: fixed; bottom: 25px; right: 25px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;"></div>

    <!-- Modal de Confirmación Personalizado -->
    <div id="admin-custom-confirm-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);" role="dialog" aria-modal="true">
        <div class="glass" style="max-width: 420px; width: 90%; padding: 30px; border-radius: 20px; border: 1px solid rgba(251, 215, 4, 0.3); background: rgba(15, 17, 26, 0.98); text-align: center;">
            <div style="background: rgba(251,215,4,0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 1px solid rgba(251,215,4,0.3);">
                <i data-lucide="alert-triangle" style="color: var(--accent-yellow); width: 24px; height: 24px;"></i>
            </div>
            <h3 id="confirm-modal-title" style="font-size: 1.3rem; font-weight: 700; color: white; margin-bottom: 10px;">Confirmar Acción</h3>
            <p id="confirm-modal-msg" style="font-size: 0.9rem; color: #8b95b0; margin-bottom: 25px; line-height: 1.5;">¿Estás seguro de que deseas realizar esta acción?</p>
            <div style="display: flex; gap: 12px;">
                <button id="confirm-modal-cancel" class="btn btn-outline" style="flex: 1; padding: 10px;">Cancelar</button>
                <button id="confirm-modal-ok" class="btn btn-primary" style="flex: 1; padding: 10px; background: #ff4a4a; border-color: #ff4a4a; color: white;">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module" src="/auth.js"></script>
    <script type="module" src="/storage.js"></script>
    <script type="module" src="/admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
